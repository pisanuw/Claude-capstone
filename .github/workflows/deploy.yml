# Self-discovering, config-driven deploy.
#
# To deploy or retarget any app, edit its `<app>/deploy/target.yml` and push
# (or run this workflow manually). This workflow finds EVERY `*/deploy/target.yml`
# in the repo and deploys each via the shared runner. Adding a new app needs no
# change here: just add its directory with a deploy/target.yml.
#
# Required repo secrets (only those relevant to your targets are used):
#   RENDER_API_KEY, NETLIFY_AUTH_TOKEN   deploy targets
#   ANTHROPIC_API_KEY                    forwarded to accessibility-lens
#   RESEND_API, ADMIN_EMAIL, COOKIE_SECRET   forwarded to mult-streak apps
name: Deploy

on:
  push:
    paths:
      - '**/deploy/target.yml'
      - 'accessibility-lens/deploy/deploy.mjs'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.find.outputs.configs }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        name: Discover deploy targets
        run: |
          configs=$(ls -1 */deploy/target.yml 2>/dev/null | jq -R . | jq -cs .)
          echo "Found: $configs"
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

  deploy:
    needs: discover
    if: needs.discover.outputs.configs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.discover.outputs.configs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deploy runner dependencies
        run: npm install
        working-directory: accessibility-lens/deploy
      - name: Deploy ${{ matrix.config }}
        run: node accessibility-lens/deploy/deploy.mjs --config "${{ matrix.config }}"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API: ${{ secrets.RESEND_API }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
